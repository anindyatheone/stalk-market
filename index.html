<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Stalk Market 🌱</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --sky: #6BBBF5;
  --green: #5CAE4A;
  --green-l: #7BC67A;
  --gold: #F5D020;
  --cream: #FDFDF5;
  --brown: #8B6347;
  --text: #3D2B1F;
  --panel: rgba(253,253,245,0.96);
  --up: #43A047;
  --down: #E53935;
  --r: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(to bottom, var(--sky) 0%, #87CEEB 38%, var(--green) 38%, var(--green-l) 100%);
  background-attachment: fixed;
  min-height: 100vh;
  color: var(--text);
}

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #6BBBF5, #87CEEB);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999; transition: opacity 0.8s;
}
#loading .isle { font-size: 72px; animation: bob 1.6s ease-in-out infinite; }
#loading h1 {
  font-family: 'Press Start 2P', monospace;
  color: white; text-shadow: 4px 4px 0 #2a6a2a;
  font-size: clamp(12px, 2.5vw, 20px);
  margin: 18px 0 10px; text-align: center; line-height: 1.6;
}
#loading p { color: rgba(255,255,255,0.8); font-size: 14px; font-weight: 700; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ── LAYOUT ── */
#game { max-width: 920px; margin: 0 auto; padding: 14px; }

/* ── HEADER ── */
#hdr {
  background: var(--panel);
  border: 3px solid var(--brown);
  border-radius: var(--r);
  padding: 12px 18px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 0 rgba(0,0,0,.15);
  margin-bottom: 10px; flex-wrap: wrap; gap: 10px;
}
.bells {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Press Start 2P', monospace; font-size: 12px;
}
.bells .amt { color: #b8860b; font-size: 14px; }
.isle-badge {
  background: linear-gradient(135deg, var(--green), var(--green-l));
  color: white; padding: 6px 16px; border-radius: 20px;
  font-weight: 800; font-size: 13px; box-shadow: 0 3px 0 #2d6e2d;
}
.lvl-bar-wrap { width: 150px; background: #e0d5c5; border-radius: 8px; height: 10px; overflow:hidden; margin-top: 4px; }
.lvl-bar { height:100%; background: linear-gradient(90deg, var(--green), var(--green-l)); border-radius:8px; transition: width .6s; }
.clock { font-size: 12px; color: #777; font-weight: 700; }
.api-dot { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; margin-top: 3px; display:inline-block; }
.api-live { background: #e8f5e9; color: var(--up); }
.api-demo { background: #fff9c4; color: #e65100; }

/* ── TICKER ── */
#ticker {
  background: linear-gradient(90deg, var(--green), var(--green-l));
  color: white; border-radius: var(--r); padding: 10px 0;
  overflow: hidden; margin-bottom: 10px;
  box-shadow: 0 3px 0 #2d6e2d;
}
.ticker-inner { display: inline-block; white-space: nowrap; animation: scroll 40s linear infinite; font-weight: 700; font-size: 13px; }
@keyframes scroll { 0%{transform:translateX(100vw)} 100%{transform:translateX(-100%)} }

/* ── TABS ── */
#tabs { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.tab-btn {
  flex: 1; min-width: 80px; padding: 10px 14px;
  background: rgba(255,255,255,.75); border: 3px solid var(--brown);
  border-radius: 12px; cursor: pointer;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px;
  color: var(--text); transition: all .15s;
}
.tab-btn:hover { background: rgba(255,255,255,.95); transform: translateY(-2px); }
.tab-btn.active { background: var(--green); color: white; border-color: #2d6e2d; box-shadow: 0 4px 0 #2d6e2d; }

/* ── PANEL ── */
.panel {
  background: var(--panel); border: 3px solid var(--brown);
  border-radius: var(--r); box-shadow: 0 4px 0 rgba(0,0,0,.13);
  padding: 18px;
}

/* ── STOCK CARDS ── */
.stocks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap: 12px; }
.scard {
  background: white; border-radius: 12px; border: 2px solid #e0d5c5;
  padding: 14px; transition: transform .15s, box-shadow .15s;
}
.scard:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,.1); }
.scard-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.sym-badge {
  font-family: 'Press Start 2P', monospace; font-size: 10px;
  background: var(--text); color: white; padding: 4px 8px; border-radius: 6px;
}
.sname { font-size: 11px; color: #999; margin-top: 4px; }
.sprice { font-family: 'Press Start 2P', monospace; font-size: 13px; }
.schg { font-size: 12px; font-weight: 800; padding: 2px 7px; border-radius: 6px; margin-top: 3px; display:inline-block; }
.chg-up { background: #e8f5e9; color: var(--up); }
.chg-dn { background: #ffebee; color: var(--down); }
.sactions { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
.qty { width: 58px; padding: 6px; border: 2px solid #e0d5c5; border-radius: 8px; font-family: 'Nunito',sans-serif; font-weight: 700; text-align: center; font-size: 13px; }
.btn-b, .btn-s {
  flex: 1; padding: 8px 10px; border-radius: 9px; border: none; cursor: pointer;
  font-family: 'Nunito',sans-serif; font-weight: 800; font-size: 13px; transition: transform .1s;
}
.btn-b:active, .btn-s:active { transform: scale(.95); }
.btn-b { background: var(--up); color: white; box-shadow: 0 3px 0 #2e7d32; }
.btn-s { background: var(--down); color: white; box-shadow: 0 3px 0 #b71c1c; }
.btn-b:hover { background: #388e3c; }
.btn-s:hover { background: #c62828; }
.owned { font-size: 11px; color: #aaa; font-weight: 700; text-align: right; margin-top: 5px; }

/* ── PORTFOLIO ── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 10px; margin-bottom: 18px; }
.stat-card { background: white; border-radius: 12px; border: 2px solid #e0d5c5; padding: 12px; text-align: center; }
.stat-lbl { font-size: 11px; color: #999; font-weight: 700; margin-bottom: 5px; }
.stat-val { font-family: 'Press Start 2P', monospace; font-size: 11px; }
.holdings { display: flex; flex-direction: column; gap: 10px; }
.hrow {
  background: white; border-radius: 12px; border: 2px solid #e0d5c5;
  padding: 12px 14px; display: flex; align-items: center; justify-content: space-between;
  gap: 10px; flex-wrap: wrap;
}
.hrow .hsym { font-family: 'Press Start 2P', monospace; font-size: 10px; }
.hrow .hmeta { font-size: 12px; color: #aaa; margin-top: 3px; }
.pnl-up { color: var(--up); font-weight: 800; }
.pnl-dn { color: var(--down); font-weight: 800; }

/* ── TURNIPS ── */
.turnip-hero {
  text-align: center; padding: 20px 16px;
  background: linear-gradient(135deg, #fff9c4, #fff176);
  border-radius: 12px; border: 2px solid #f9a825; margin-bottom: 16px;
}
.t-price { font-family: 'Press Start 2P', monospace; font-size: 22px; color: #e65100; margin: 8px 0; }
.forecast { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; margin: 14px 0; }
.fday {
  background: white; border-radius: 8px; padding: 7px 3px; text-align: center;
  border: 2px solid #e0d5c5; font-size: 11px;
}
.fday.today { border-color: #f9a825; background: #fff9c4; }
.fday.past  { background: #f5f5f5; opacity: .6; }
.fday .dname { font-weight: 800; color: #aaa; font-size: 10px; }
.fday .dprice { font-weight: 800; margin-top: 3px; font-size: 12px; }

/* ── VILLAGE ── */
.npc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap: 14px; }
.npc-card { background: white; border-radius: 12px; border: 2px solid #e0d5c5; padding: 16px; text-align: center; }
.npc-av { font-size: 46px; margin-bottom: 6px; }
.npc-name { font-family: 'Press Start 2P', monospace; font-size: 9px; margin-bottom: 4px; }
.npc-role { font-size: 11px; color: #aaa; margin-bottom: 8px; }
.speech {
  background: #f5f5f5; border-radius: 10px; padding: 10px 12px;
  font-size: 12px; color: #555; font-style: italic; line-height: 1.5; text-align: left;
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 22px; right: 22px;
  background: var(--text); color: white;
  padding: 12px 18px; border-radius: 12px;
  font-weight: 700; font-size: 13px;
  opacity: 0; transform: translateY(20px);
  transition: all .3s; z-index: 100; max-width: 320px; line-height: 1.4;
}
#toast.show { opacity: 1; transform: translateY(0); }

/* ── MISC ── */
.locked-msg { text-align: center; padding: 36px; color: #bbb; margin-top: 16px; }
.locked-msg .icon { font-size: 42px; }
.big-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Nunito',sans-serif; font-weight: 800; font-size: 14px; transition: transform .1s; }
.big-btn:active { transform: scale(.97); }
.card-sm { background: white; border: 2px solid #e0d5c5; border-radius: 12px; padding: 14px; margin-top: 14px; }
.sentiment-bar { text-align: center; padding: 14px; background: white; border-radius: 12px; border: 2px solid #e0d5c5; margin-top: 14px; font-size: 13px; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,.2); border-radius: 3px; }

/* ── CHART MODAL ── */
#chart-overlay {
  position: fixed; inset: 0;
  background: rgba(30,20,10,0.55);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
#chart-overlay.open { opacity: 1; pointer-events: all; }

#chart-modal {
  background: var(--cream);
  border: 3px solid var(--brown);
  border-radius: 18px;
  box-shadow: 0 8px 0 rgba(0,0,0,.25), 0 16px 40px rgba(0,0,0,.3);
  width: min(860px, 96vw);
  max-height: 92vh;
  overflow-y: auto;
  padding: 20px 22px 22px;
  transform: translateY(30px) scale(0.97);
  transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
  scrollbar-width: thin;
}
#chart-overlay.open #chart-modal {
  transform: translateY(0) scale(1);
}

/* Modal header */
#cm-hdr {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
  padding-bottom: 14px;
  border-bottom: 2px solid #e0d5c5;
  margin-bottom: 14px;
  position: relative;
}
#cm-close {
  position: absolute; top: 0; right: 0;
  background: #f5ece0; border: 2px solid var(--brown);
  border-radius: 50%; width: 34px; height: 34px;
  font-size: 14px; cursor: pointer; color: var(--text);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; transition: background .15s;
  line-height: 1;
}
#cm-close:hover { background: #ffe0cc; }

/* Stats row */
#cm-stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 8px;
  margin-bottom: 14px;
}
.cm-stat {
  background: white; border: 2px solid #e0d5c5;
  border-radius: 10px; padding: 8px 10px; text-align: center;
}
.cm-stat-lbl { font-size: 9px; color: #aaa; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
.cm-stat-val { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--text); }

/* Range buttons */
#cm-ranges {
  display: flex; gap: 6px; margin-bottom: 10px;
}
.range-btn {
  padding: 5px 14px; border-radius: 20px;
  border: 2px solid #e0d5c5; background: white;
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: 12px; cursor: pointer; color: var(--text);
  transition: all .15s;
}
.range-btn:hover { border-color: var(--brown); }
.range-btn.active {
  background: var(--green); color: white;
  border-color: #2d6e2d; box-shadow: 0 3px 0 #2d6e2d;
}

/* Chart wrapper */
#cm-chart-wrap {
  position: relative;
  background: white; border: 2px solid #e0d5c5;
  border-radius: 12px; padding: 12px;
  min-height: 220px;
  margin-bottom: 8px;
}
#cm-chart-loader {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: #aaa; font-size: 14px;
  border-radius: 10px; background: white;
  z-index: 2;
  animation: pulse 1.2s ease-in-out infinite;
}
#cm-canvas { display: block; width: 100% !important; height: 220px !important; }

/* Volume */
#cm-vol-wrap {
  background: white; border: 2px solid #e0d5c5;
  border-radius: 12px; padding: 8px 12px;
  margin-bottom: 14px;
}
#cm-vol-canvas { display: block; width: 100% !important; height: 56px !important; }

/* Trade section inside modal */
#cm-trade {
  background: white; border: 2px solid #e0d5c5;
  border-radius: 12px; padding: 14px;
  margin-top: 6px;
}
#cm-trade h4 {
  font-weight: 800; font-size: 13px; margin-bottom: 10px;
}
.cm-trade-row {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.cm-holdings {
  background: #f5f5f5; border-radius: 8px;
  padding: 8px 12px; font-size: 12px; font-weight: 700;
  color: #666; margin-top: 8px;
}

@media(max-width:600px){
  .stocks-grid { grid-template-columns: 1fr; }
  .forecast { grid-template-columns: repeat(4,1fr); }
  #hdr { flex-direction: column; text-align: center; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="isle">🏝️</div>
  <h1>THE STALK<br>MARKET</h1>
  <p id="load-msg">Fetching market data…</p>
</div>

<div id="toast"></div>

<!-- STOCK DETAIL MODAL -->
<div id="chart-overlay" onclick="closeChart(event)">
  <div id="chart-modal">
    <!-- Header -->
    <div id="cm-hdr">
      <div style="display:flex;align-items:center;gap:12px">
        <div id="cm-em" style="font-size:36px"></div>
        <div>
          <div id="cm-sym" class="sym-badge" style="font-size:11px"></div>
          <div id="cm-name" style="font-size:12px;color:#aaa;margin-top:4px;font-weight:700"></div>
        </div>
      </div>
      <div style="text-align:right">
        <div id="cm-price" style="font-family:'Press Start 2P',monospace;font-size:16px"></div>
        <div id="cm-chg" style="font-size:13px;font-weight:800;margin-top:4px"></div>
      </div>
      <button id="cm-close" onclick="closeChart()" title="Close">✕</button>
    </div>

    <!-- Key stats row -->
    <div id="cm-stats"></div>

    <!-- Range selector -->
    <div id="cm-ranges">
      <button class="range-btn active" onclick="setRange('1W',this)">1W</button>
      <button class="range-btn" onclick="setRange('1M',this)">1M</button>
      <button class="range-btn" onclick="setRange('3M',this)">3M</button>
      <button class="range-btn" onclick="setRange('1Y',this)">1Y</button>
      <button class="range-btn" onclick="setRange('5Y',this)">5Y</button>
    </div>

    <!-- Chart -->
    <div id="cm-chart-wrap">
      <div id="cm-chart-loader">🌿 Fetching history…</div>
      <canvas id="cm-canvas"></canvas>
    </div>

    <!-- Volume bars -->
    <div id="cm-vol-wrap" style="display:none">
      <canvas id="cm-vol-canvas"></canvas>
    </div>

    <!-- Trade + holdings -->
    <div id="cm-trade"></div>
  </div>
</div>

<div id="game" style="display:none">
  <!-- HEADER -->
  <div id="hdr">
    <div class="bells">
      <span style="font-size:22px">🔔</span>
      <div>
        <div style="font-size:9px;color:#aaa;margin-bottom:2px">BELLS</div>
        <div class="amt" id="bells-amt">50,000</div>
      </div>
    </div>
    <div style="text-align:center">
      <div class="isle-badge" id="isle-badge">🏝️ Deserted Isle</div>
      <div class="lvl-bar-wrap" style="margin:5px auto 0"><div class="lvl-bar" id="lvl-bar" style="width:0%"></div></div>
      <div style="font-size:10px;color:#aaa;margin-top:3px" id="lvl-hint"></div>
    </div>
    <div style="text-align:right">
      <div class="clock" id="clock"></div>
      <div class="api-dot api-demo" id="api-dot">📡 Loading…</div>
      <div style="margin-top:5px">
        <button onclick="resetGame()" style="font-size:10px;padding:3px 8px;border:1px solid #ccc;border-radius:6px;cursor:pointer;background:white;color:#888">↺ Reset</button>
      </div>
    </div>
  </div>

  <!-- TICKER -->
  <div id="ticker"><span class="ticker-inner" id="ticker-text">🌿 Welcome to The Stalk Market! Loading…</span></div>

  <!-- TABS -->
  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('market')">🏪 Market</button>
    <button class="tab-btn" onclick="switchTab('portfolio')">💼 Portfolio</button>
    <button class="tab-btn" onclick="switchTab('turnips')">🌱 Turnips</button>
    <button class="tab-btn" onclick="switchTab('village')">🏘️ Village</button>
  </div>

  <!-- CONTENT -->
  <div class="panel" id="content">Loading…</div>
</div>

// STOCK API
// ══════════════════════════════════════════════════════════

const PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
];

async function tryFetch(url) {
  for (const proxy of PROXIES) {
    try {
      const r = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
      if (!r.ok) continue;
      return await r.json();
    } catch(e) { continue; }
  }
  throw new Error('All proxies failed');
}

async function fetchPrices(syms) {
  const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${syms.join(',')}&fields=regularMarketPrice,regularMarketChangePercent,shortName`;
  const data = await tryFetch(url);
  const results = data?.quoteResponse?.result || [];
  if (!results.length) throw new Error('Empty result');
  const out = {};
  for (const r of results) {
    out[r.symbol] = {
      price: r.regularMarketPrice,
      chg:   r.regularMarketChangePercent,
      name:  r.shortName || r.symbol,
    };
  }
  return out;
}

function simMove(prices) {
  const out = {};
  for (const [s, d] of Object.entries(prices)) {
    const vol = ['TSLA','NVDA','META'].includes(s) ? 0.014 : 0.004;
    const move = (Math.random() - 0.5) * 2 * vol;
    out[s] = { ...d, price: Math.max(1, Math.round(d.price*(1+move)*100)/100), chg: +(move*100).toFixed(2) };
  }
  return out;
}

async function refreshPrices() {
  const syms = CATALOG.map(c => c.sym);
  try {
    const fresh = await fetchPrices(syms);
    G.prevPrices = { ...G.prices };
    G.prices = { ...DEMO, ...fresh };
    G.source = 'live';
    setApiDot('🟢 Live Data', 'api-live');
  } catch(e) {
    G.prevPrices = { ...G.prices };
    G.prices = Object.keys(G.prices).length ? simMove(G.prices) : { ...DEMO };
    G.source = 'demo';
    setApiDot('🟡 Simulated', 'api-demo');
  }
  recalcLevel();
  updateBells();
  updateTicker();
  renderCur();
  save();
}

function setApiDot(text, cls) {
  const el = document.getElementById('api-dot');
  if (el) { el.textContent = text; el.className = 'api-dot ' + cls; }
}

// TURNIP MARKET (STALK MARKET)
// ══════════════════════════════════════════════════════════

function weekId() {
  const n = new Date();
  const y = n.getFullYear();
  const w = Math.floor((n - new Date(y,0,1)) / 604800000);
  return `${y}-${w}`;
}

function dow() { return new Date().getDay(); } // 0=Sun

// Deterministic LCG from seed
function lcg(seed) { return ((1664525 * seed + 1013904223) >>> 0) / 4294967296; }

function weekSeed() {
  return weekId().split('').reduce((a,c) => a + c.charCodeAt(0), 0);
}

function turnipBuyPrice() {
  return 90 + Math.floor(lcg(weekSeed()) * 21); // 90–110
}

function weekPrices() {
  const seed = weekSeed();
  const buy = turnipBuyPrice();
  const types = ['spike','bulk','falling','random'];
  const type = types[Math.floor(lcg(seed + 1) * 4)];
  const arr = [buy];
  for (let i = 1; i <= 6; i++) {
    const r = lcg(seed * 31 + i * 7919);
    let p;
    if (type === 'spike') {
      const spike = 2 + Math.floor(lcg(seed + 99) * 4);
      p = i === spike ? Math.round(buy * (1.8 + r * 0.6)) : Math.round(buy * (0.55 + r * 0.3));
    } else if (type === 'bulk') {
      p = Math.round(buy * (1.0 + i * 0.05 + r * 0.1));
    } else if (type === 'falling') {
      p = Math.round(buy * (1.1 - i * 0.09 + r * 0.05));
    } else {
      p = Math.round(buy * (0.55 + r * 0.9));
    }
    arr.push(Math.max(10, p));
  }
  return arr;
}

function checkSpoilage() {
  if (!G.turnips.shares) return;
  if (G.turnips.weekId && G.turnips.weekId !== weekId()) {
    showToast(`😱 Your ${G.turnips.shares.toLocaleString()} turnip bundles SPOILED! They're worthless now!`);
    G.turnips = { buyPrice:null, shares:0, weekId:null };
    save();
  }
}

// ══════════════════════════════════════════════════════════
// ISLAND PROGRESSION
// ══════════════════════════════════════════════════════════

function netWorth() {
  let total = G.bells;
  for (const [sym, h] of Object.entries(G.portfolio)) {
    total += h.shares * (G.prices[sym]?.price || h.avgPrice);
  }
  if (G.turnips.shares) {
    const wp = weekPrices();
    total += G.turnips.shares * (wp[dow()] || G.turnips.buyPrice);
  }
  return total;
}

function recalcLevel() {
  const w = netWorth();
  let lv = 0;
  for (let i = ISLANDS.length - 1; i >= 0; i--) {
    if (w >= ISLANDS[i].threshold) { lv = i; break; }
  }
  if (lv > G.isleLevel) {
    showToast(`🎉 Island Level Up! Welcome to ${ISLANDS[lv].emoji} ${ISLANDS[lv].name}! New stocks unlocked!`);
  }
  G.isleLevel = lv;
  const el = document.getElementById('isle-badge');
  if (el) el.textContent = `${ISLANDS[lv].emoji} ${ISLANDS[lv].name}`;
  const bar = document.getElementById('lvl-bar');
  const hint = document.getElementById('lvl-hint');
  const next = ISLANDS[lv + 1];
  if (bar) {
    const cur = ISLANDS[lv].threshold;
    const pct = next ? Math.min(100, ((w - cur) / (next.threshold - cur)) * 100) : 100;
    bar.style.width = pct + '%';
  }
  if (hint) {
    hint.textContent = next ? `🔔${Math.round(next.threshold - w).toLocaleString()} to next level` : '🌟 Max Level!';
  }
}

// ══════════════════════════════════════════════════════════
// TRADING
// ══════════════════════════════════════════════════════════

function buy(sym, rawQty) {
  const qty = parseInt(rawQty);
  if (!qty || qty < 1) { showToast('Enter a valid quantity!'); return; }
  const price = G.prices[sym]?.price;
  if (!price) { showToast('Price unavailable!'); return; }
  const cost = Math.round(price * qty * 100) / 100;
  if (cost > G.bells) { showToast(`Not enough Bells! Need 🔔${cost.toLocaleString()}`); return; }
  G.bells -= cost;
  const h = G.portfolio[sym] || { shares:0, avgPrice:0 };
  const total = h.shares + qty;
  h.avgPrice = (h.avgPrice * h.shares + price * qty) / total;
  h.shares = total;
  G.portfolio[sym] = h;
  recalcLevel(); updateBells();
  showToast(`✅ Bought ${qty} share${qty>1?'s':''} of ${sym} for 🔔${cost.toLocaleString()}`);
  save(); renderCur();
}

function sell(sym, rawQty) {
  const qty = parseInt(rawQty);
  if (!qty || qty < 1) { showToast('Enter a valid quantity!'); return; }
  const h = G.portfolio[sym];
  if (!h || h.shares < qty) { showToast("You don't own that many shares!"); return; }
  const price = G.prices[sym]?.price;
  if (!price) { showToast('Price unavailable!'); return; }
  const proceeds = Math.round(price * qty * 100) / 100;
  const profit   = Math.round((price - h.avgPrice) * qty * 100) / 100;
  G.bells += proceeds;
  h.shares -= qty;
  if (h.shares === 0) delete G.portfolio[sym]; else G.portfolio[sym] = h;
  recalcLevel(); updateBells();
  const sign = profit >= 0 ? `+🔔${profit.toLocaleString()}` : `-🔔${Math.abs(profit).toLocaleString()}`;
  showToast(`💰 Sold ${qty} ${sym} for 🔔${proceeds.toLocaleString()} (P&L: ${sign})`);
  save(); renderCur();
}

function buyTurnips(rawQty) {
  const qty = parseInt(rawQty);
  if (!qty || qty < 1) { showToast('Enter a valid quantity!'); return; }
  if (dow() !== 1) { showToast('🌱 Turnips are only sold on Mondays!'); return; }
  const price = turnipBuyPrice();
  const cost = price * qty;
  if (cost > G.bells) { showToast(`Not enough Bells! Need 🔔${cost.toLocaleString()}`); return; }
  G.bells -= cost;
  G.turnips.buyPrice = price;
  G.turnips.shares = (G.turnips.shares || 0) + qty;
  G.turnips.weekId = weekId();
  updateBells();
  showToast(`🌱 Bought ${qty.toLocaleString()} turnip bundles at 🔔${price} each!`);
  save(); renderTurnips();
}

function sellTurnips() {
  if (!G.turnips.shares) { showToast("You don't have any turnips!"); return; }
  if (dow() === 0) { showToast("Timmy & Tommy won't buy turnips on Sundays!"); return; }
  checkSpoilage();
  if (!G.turnips.shares) return;
  const wp = weekPrices();
  const price = wp[dow()];
  const proceeds = price * G.turnips.shares;
  const profit = proceeds - G.turnips.buyPrice * G.turnips.shares;
  G.bells += proceeds;
  const sign = profit >= 0 ? `Profit +🔔${profit.toLocaleString()}` : `Loss -🔔${Math.abs(profit).toLocaleString()}`;
  showToast(`🌱 Sold ${G.turnips.shares.toLocaleString()} turnips for 🔔${proceeds.toLocaleString()}! (${sign})`);
  G.turnips = { buyPrice:null, shares:0, weekId:null };
  recalcLevel(); updateBells(); save(); renderTurnips();
}

function updateBells() {

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 3600);
}

function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['market','portfolio','turnips','village'][i] === tab);
  });
  renderCur();
}

function renderCur() {
  if (curTab==='market')    renderMarket();
  else if (curTab==='portfolio') renderPortfolio();
  else if (curTab==='turnips')   renderTurnips();
  else                           renderVillage();
}

function bell(n, decimals=2) {
  return '🔔' + n.toLocaleString(undefined,{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
}

function updateTicker() {
  const parts = [];
  for (const s of CATALOG) {
    const p = G.prices[s.sym];
    if (!p) continue;
    const arrow = p.chg >= 0 ? '▲' : '▼';
    const dot   = p.chg >= 0 ? '🟢' : '🔴';
    parts.push(`${dot} ${s.sym} ${bell(p.price)} ${arrow}${Math.abs(p.chg).toFixed(2)}%`);
  }
  const el = document.getElementById('ticker-text');
  if (el && parts.length) el.textContent = '  🌿 ' + parts.join('   ✦   ') + '   🌿  ';
}

function updateClock() {
  const n = new Date();
  const el = document.getElementById('clock');
  if (el) el.textContent = n.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'}) + ' ' +
    n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  // Day/night sky
  const h = n.getHours();
  const sky = h>=6&&h<9 ? '#FFB74D' : h>=9&&h<17 ? '#6BBBF5' : h>=17&&h<20 ? '#FF8A65' : '#283593';
  const sky2 = h>=17||h<6 ? '#1A237E' : '#87CEEB';
  document.body.style.background = `linear-gradient(to bottom,${sky} 0%,${sky2} 38%,#5CAE4A 38%,#7BC67A 100%)`;
}

function renderMarket() {

  let h = '<div class="stocks-grid">';
  for (const s of unlocked) {
    const p = G.prices[s.sym];
    if (!p) continue;
    const holding = G.portfolio[s.sym];
    const cls = p.chg >= 0 ? 'chg-up' : 'chg-dn';
    const chgStr = `${p.chg >= 0 ? '+' : ''}${p.chg.toFixed(2)}%`;
    h += `
    <div class="scard" style="cursor:pointer" onclick="openChart('${s.sym}')">
      <div class="scard-hdr">
        <div>
          <div class="sym-badge">${s.em} ${s.sym}</div>
          <div class="sname">${p.name || s.name}</div>
        </div>
        <div style="text-align:right">
          <div class="sprice">${bell(p.price)}</div>
          <span class="schg ${cls}">${chgStr}</span>
        </div>
      </div>
      <div style="font-size:10px;color:#bbb;text-align:center;margin:4px 0 6px;font-weight:700">📈 Tap to view chart</div>
      <div class="sactions" onclick="event.stopPropagation()">
        <input type="number" class="qty" id="q-${s.sym}" value="1" min="1">
        <button class="btn-b" onclick="buy('${s.sym}',document.getElementById('q-${s.sym}').value)">Buy</button>
        <button class="btn-s" onclick="sell('${s.sym}',document.getElementById('q-${s.sym}').value)">Sell</button>
      </div>
      ${holding ? `<div class="owned">📋 ${holding.shares} shares · avg ${bell(holding.avgPrice)}</div>` : ''}

  }
  h += '</div>';

  if (locked.length) {
    const nw = netWorth();
    const next = ISLANDS.find(i => i.threshold > nw);
    h += `<div class="locked-msg">
      <div class="icon">🔒</div>
      <p style="font-weight:800;margin-top:8px">${locked.length} more stock${locked.length>1?'s':''} locked</p>
      <p style="font-size:12px;margin-top:4px">${next ? `Reach 🔔${next.threshold.toLocaleString()} net worth to unlock more!` : ''}</p>
    </div>`;
  }

  document.getElementById('content').innerHTML = h;
}

function renderPortfolio() {
  const holdings = Object.entries(G.portfolio);
  const stockVal  = holdings.reduce((s,[sym,h]) => s + h.shares*(G.prices[sym]?.price||h.avgPrice), 0);
  const invested  = holdings.reduce((s,[,h]) => s + h.shares*h.avgPrice, 0);
  const pnl       = stockVal - invested;
  const nw        = netWorth();
  const pnlCls    = pnl>=0 ? 'pnl-up' : 'pnl-dn';

  let h = `
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-lbl">💰 Cash Bells</div><div class="stat-val">${bell(G.bells,0)}</div></div>
    <div class="stat-card"><div class="stat-lbl">📈 Stock Value</div><div class="stat-val">${bell(stockVal,0)}</div></div>
    <div class="stat-card"><div class="stat-lbl">💎 Net Worth</div><div class="stat-val">${bell(nw,0)}</div></div>
    <div class="stat-card"><div class="stat-lbl">📊 Total P&amp;L</div><div class="stat-val ${pnlCls}">${pnl>=0?'+':''}${bell(pnl,0)}</div></div>
  </div>`;

  if (!holdings.length) {
    h += `<div style="text-align:center;padding:40px;color:#bbb">
      <div style="font-size:46px">📭</div>
      <p style="font-weight:800;margin-top:8px">No holdings yet!</p>
      <p style="font-size:12px;margin-top:4px">Head to the Market tab to buy your first shares!</p>
    </div>`;
  } else {
    h += '<div class="holdings">';
    for (const [sym, holding] of holdings) {
      const st = CATALOG.find(c => c.sym===sym);
      const price  = G.prices[sym]?.price || holding.avgPrice;
      const val    = holding.shares * price;
      const rowpnl = (price - holding.avgPrice) * holding.shares;
      const pct    = ((price - holding.avgPrice) / holding.avgPrice * 100).toFixed(1);
      const rc     = rowpnl>=0 ? 'pnl-up' : 'pnl-dn';
      h += `
      <div class="hrow">
        <div>
          <div class="hsym">${st?.em||'📊'} ${sym}</div>
          <div class="hmeta">${holding.shares} shares · avg ${bell(holding.avgPrice)} · now ${bell(price)}</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:800">${bell(val,0)}</div>
          <div class="${rc}">${rowpnl>=0?'+':''}${bell(rowpnl,0)} (${rowpnl>=0?'+':''}${pct}%)</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="number" class="qty" id="sq-${sym}" value="${holding.shares}" min="1" max="${holding.shares}">
          <button class="btn-s" onclick="sell('${sym}',document.getElementById('sq-${sym}').value)">Sell</button>
        </div>
      </div>`;
    }
    h += '</div>';
  }
  document.getElementById('content').innerHTML = h;
}

      <p class="${rc}" style="margin-top:4px;font-weight:800">${tpnl>=0?'📈 Unrealized profit:':'📉 Unrealized loss:'} ${tpnl>=0?'+':''}🔔${Math.round(tpnl).toLocaleString()}</p>
      ${!isSun
        ? `<button class="big-btn btn-s" style="margin-top:12px" onclick="sellTurnips()">💰 Sell All Turnips (🔔${cur} each)</button>`
        : `<p style="color:#888;margin-top:8px;font-size:12px">Cannot sell on Sundays!</p>`}
    </div>`;
  }

  if (isMon) {
    h += `
    <div class="card-sm">
      <h3 style="font-weight:800;margin-bottom:10px">🛒 Buy Turnip Bundles</h3>
      <p style="font-size:13px;color:#888;margin-bottom:10px">Price: 🔔${buy}/bundle · Balance: ${bell(G.bells,0)}</p>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="number" class="qty" id="t-qty" value="100" min="1" style="width:100px">
        <button class="big-btn btn-b" onclick="buyTurnips(document.getElementById('t-qty').value)">🌱 Buy Bundles</button>

  document.getElementById('content').innerHTML = h;
}

function renderVillage() {
  const vals = Object.values(G.prices);
  const avgChg = vals.length ? vals.reduce((s,p) => s+p.chg, 0) / vals.length : 0;
  const sentiment = avgChg > 0.5 ? 'bull' : avgChg < -0.5 ? 'bear' : 'flat';
  const sentLabel = sentiment==='bull' ? '🐂 Bullish' : sentiment==='bear' ? '🐻 Bearish' : '😐 Neutral';
  const sentColor = sentiment==='bull' ? '#2e7d32' : sentiment==='bear' ? '#c62828' : '#777';

  const rotIdx = Math.floor(Date.now() / 60_000); // rotate messages each minute

  let h = '<div class="npc-grid">';
  for (const npc of NPCS) {
    const msgs = npc[sentiment];
    const msg  = msgs[rotIdx % msgs.length];
    h += `
    <div class="npc-card">
      <div class="npc-av">${npc.em}</div>
      <div class="npc-name">${npc.name}</div>
      <div class="npc-role">${npc.role}</div>
      <div class="speech">${msg}</div>
    </div>`;
  }
  h += '</div>';

  h += `
  <div class="sentiment-bar">
    <strong>Market Sentiment: <span style="color:${sentColor}">${sentLabel}</span></strong>
    <p style="font-size:12px;color:#aaa;margin-top:3px">Avg market change: ${avgChg>=0?'+':''}${avgChg.toFixed(2)}% · Updates every minute</p>
  </div>
  <div class="card-sm" style="text-align:center;color:#aaa;margin-top:14px">
    <p style="font-weight:800;font-size:12px">🏝️ Net Worth: ${bell(netWorth(),0)}</p>
    <p style="font-size:11px;margin-top:4px">Island Level: ${ISLANDS[G.isleLevel].emoji} ${ISLANDS[G.isleLevel].name}</p>
    <p style="font-size:11px;margin-top:2px">Data source: ${G.source === 'live' ? '🟢 Yahoo Finance (Live)' : '🟡 Simulated'}</p>
  </div>`;

  document.getElementById('content').innerHTML = h;
}

// STOCK DETAIL CHART MODAL
// ══════════════════════════════════════════════════════════

let _chartInst = null;   // Chart.js instance (price)
let _volInst   = null;   // Chart.js instance (volume)
let _curSym    = null;   // currently open symbol
let _curRange  = '1W';   // active range
let _histCache = {};     // { SYM: { range: { dates, closes, volumes, high52, low52, open } } }

// Range → Yahoo Finance params
const RANGE_CFG = {
  '1W': { range: '5d',  interval: '1d'  },
  '1M': { range: '1mo', interval: '1d'  },
  '3M': { range: '3mo', interval: '1d'  },
  '1Y': { range: '1y',  interval: '1wk' },
  '5Y': { range: '5y',  interval: '1mo' },
};

async function fetchHistory(sym, range) {
  const key = `${sym}:${range}`;
  if (_histCache[key]) return _histCache[key];

  const cfg = RANGE_CFG[range];
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=${cfg.interval}&range=${cfg.range}`;
  try {
    const data = await tryFetch(url);
    const res  = data?.chart?.result?.[0];
    if (!res) throw new Error('No result');

    const ts      = res.timestamps || res.timestamp || [];
    const quotes  = res.indicators?.quote?.[0] || {};
    const closes  = quotes.close  || [];
    const volumes = quotes.volume || [];
    const opens   = quotes.open   || [];
    const highs   = quotes.high   || [];
    const lows    = quotes.low    || [];

    const dates = ts.map(t => {
      const d = new Date(t * 1000);
      if (range === '1W' || range === '1M' || range === '3M') {
        return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
      }
      return d.toLocaleDateString([], { year: '2-digit', month: 'short' });
    });

    const validCloses = closes.filter(Boolean);
    const result = {
      dates,
      closes,
      volumes,
      opens,
      highs,
      lows,
      high52: Math.max(...validCloses),
      low52:  Math.min(...validCloses),
    };
    _histCache[key] = result;
    return result;
  } catch(e) {
    return null;
  }
}

function makeSyntheticHistory(sym, range, currentPrice) {
  const cfg = RANGE_CFG[range];
  // days of data to generate
  const counts = { '1W': 5, '1M': 22, '3M': 65, '1Y': 52, '5Y': 60 };
  const n = counts[range] || 22;

  // Simple seeded LCG walk
  let seed = sym.split('').reduce((a, c) => a + c.charCodeAt(0), 0) + n;
  const rng = () => { seed = (1664525 * seed + 1013904223) >>> 0; return seed / 4294967296; };

  const vol = ['TSLA','NVDA','META'].includes(sym) ? 0.025 : 0.012;

  // Walk backwards from current price
  const closes = [currentPrice];
  for (let i = 1; i < n; i++) {
    const prev = closes[closes.length - 1];
    closes.push(Math.max(1, prev * (1 + (rng() - 0.48) * vol)));
  }
  closes.reverse();

  const now = Date.now();
  const msPerBar = { '1W': 864e5, '1M': 864e5, '3M': 864e5, '1Y': 6048e5, '5Y': 2592e6 };
  const step = msPerBar[range] || 864e5;
  const dates = closes.map((_, i) => {
    const d = new Date(now - (n - 1 - i) * step);
    if (range === '1W' || range === '1M' || range === '3M') {
      return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    }
    return d.toLocaleDateString([], { year: '2-digit', month: 'short' });
  });

  const volumes = closes.map(() => Math.floor(rng() * 50_000_000 + 5_000_000));
  const validCloses = closes.filter(Boolean);
  return {
    dates, closes, volumes,
    opens: closes.map(c => c * (0.99 + rng() * 0.02)),
    highs: closes.map(c => c * (1 + rng() * 0.015)),
    lows:  closes.map(c => c * (0.985 + rng() * 0.01)),
    high52: Math.max(...validCloses),
    low52:  Math.min(...validCloses),
    synthetic: true,
  };
}

function destroyCharts() {
  if (_chartInst) { _chartInst.destroy(); _chartInst = null; }
  if (_volInst)   { _volInst.destroy();   _volInst   = null; }
}

function renderChart(hist, sym, isUp) {
  destroyCharts();
  const canvas = document.getElementById('cm-canvas');
  const volCanvas = document.getElementById('cm-vol-canvas');
  const loader  = document.getElementById('cm-chart-loader');
  const volWrap = document.getElementById('cm-vol-wrap');

  if (!hist || !hist.closes.length) {
    loader.textContent = '⚠️ No history available';
    loader.style.display = 'flex';
    canvas.style.display = 'none';
    volWrap.style.display = 'none';
    return;
  }

  loader.style.display = 'none';
  canvas.style.display = 'block';

  const lineColor  = isUp ? '#43A047' : '#E53935';
  const fillColor  = isUp ? 'rgba(67,160,71,0.13)' : 'rgba(229,57,53,0.10)';
  const dotColor   = isUp ? '#2e7d32' : '#b71c1c';

  // Filter null/undefined closes
  const labels = [];
  const data   = [];
  for (let i = 0; i < hist.dates.length; i++) {
    if (hist.closes[i] != null) {
      labels.push(hist.dates[i]);
      data.push(+hist.closes[i].toFixed(2));
    }
  }

  _chartInst = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: lineColor,
        borderWidth: 2.5,
        backgroundColor: fillColor,
        fill: true,
        tension: 0.35,
        pointRadius: data.length <= 20 ? 3 : 0,
        pointHoverRadius: 5,
        pointBackgroundColor: dotColor,
        pointBorderColor: 'white',
        pointBorderWidth: 1.5,
      }]
    },
    options: {
      responsive: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#3D2B1F',
          titleColor: '#aaa',
          bodyColor: 'white',
          titleFont: { family: 'Nunito', size: 11, weight: '700' },
          bodyFont: { family: "'Press Start 2P'", size: 10 },
          padding: 10,
          cornerRadius: 8,
          callbacks: {
            label: ctx => ` 🔔${ctx.parsed.y.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`,
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.04)', drawTicks: false },
          ticks: {
            font: { family: 'Nunito', size: 10, weight: '700' },
            color: '#bbb',
            maxRotation: 0,
            maxTicksLimit: 7,
          },
          border: { display: false },
        },
        y: {
          position: 'right',
          grid: { color: 'rgba(0,0,0,0.05)', drawTicks: false },
          ticks: {
            font: { family: "'Press Start 2P'", size: 8 },
            color: '#999',
            maxTicksLimit: 5,
            callback: v => '🔔' + v.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}),
          },
          border: { display: false },
        }
      },
    }
  });

  // Volume bars
  const vols = hist.volumes.filter((v,i) => hist.closes[i] != null);
  if (vols.length) {
    volWrap.style.display = 'block';
    _volInst = new Chart(volCanvas.getContext('2d'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: vols.map(v => v || 0),
          backgroundColor: isUp ? 'rgba(67,160,71,0.35)' : 'rgba(229,57,53,0.30)',
          borderColor: isUp ? 'rgba(67,160,71,0.6)' : 'rgba(229,57,53,0.55)',
          borderWidth: 1,
          borderRadius: 2,
        }]
      },
      options: {
        responsive: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          x: { display: false },
          y: {
            position: 'right',
            grid: { display: false },
            ticks: {
              font: { family: 'Nunito', size: 8 },
              color: '#ccc',
              maxTicksLimit: 2,
              callback: v => v >= 1e6 ? (v/1e6).toFixed(0)+'M' : v >= 1e3 ? (v/1e3).toFixed(0)+'K' : v,
            },
            border: { display: false },
          }
        }
      }
    });
  } else {
    volWrap.style.display = 'none';
  }
}

function buildModalStats(sym, hist, price) {
  const p = G.prices[sym];
  const chg = p?.chg ?? 0;
  const isUp = chg >= 0;

  // Header
  document.getElementById('cm-price').textContent = `🔔${price.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const chgEl = document.getElementById('cm-chg');
  chgEl.textContent = `${isUp?'▲':'▼'} ${Math.abs(chg).toFixed(2)}%`;
  chgEl.style.color = isUp ? '#43A047' : '#E53935';

  // Stats
  const statsEl = document.getElementById('cm-stats');
  const high52 = hist?.high52 ?? price;
  const low52  = hist?.low52  ?? price;
  const h = G.portfolio[sym];
  const statsData = [
    { lbl: '52W High', val: `🔔${high52.toFixed(0)}` },
    { lbl: '52W Low',  val: `🔔${low52.toFixed(0)}` },
    { lbl: 'Day Chg',  val: `${isUp?'+':''}${chg.toFixed(2)}%` },
    { lbl: 'You Own',  val: h ? `${h.shares} sh` : '—' },
    { lbl: 'Avg Cost', val: h ? `🔔${h.avgPrice.toFixed(2)}` : '—' },
    { lbl: 'P&L',      val: h ? (() => { const r=(price-h.avgPrice)/h.avgPrice*100; return `${r>=0?'+':''}${r.toFixed(1)}%`; })() : '—' },
  ];
  statsEl.innerHTML = statsData.map(s => `
    <div class="cm-stat">
      <div class="cm-stat-lbl">${s.lbl}</div>
      <div class="cm-stat-val">${s.val}</div>
    </div>`).join('');

  // Trade section
  const tradeEl = document.getElementById('cm-trade');
  const holding = G.portfolio[sym];
  tradeEl.innerHTML = `
    <h4>🛒 Trade ${sym}</h4>
    <div class="cm-trade-row">
      <input type="number" class="qty" id="cm-qty" value="1" min="1" style="width:70px">
      <button class="btn-b" onclick="buy('${sym}',document.getElementById('cm-qty').value);buildModalStats('${sym}',_lastHist,G.prices['${sym}']?.price||0)">Buy</button>
      <button class="btn-s" onclick="sell('${sym}',document.getElementById('cm-qty').value);buildModalStats('${sym}',_lastHist,G.prices['${sym}']?.price||0)">Sell</button>
      <span style="font-size:12px;color:#aaa;font-weight:700">Balance: 🔔${Math.round(G.bells).toLocaleString()}</span>
    </div>
    ${holding ? `<div class="cm-holdings">📋 Holding ${holding.shares} shares · avg 🔔${holding.avgPrice.toFixed(2)} · current 🔔${price.toFixed(2)}</div>` : ''}
  `;
}

let _lastHist = null; // last fetched history for trade refresh

async function openChart(sym) {
  _curSym   = sym;
  _curRange = '1W';

  // Reset range buttons
  document.querySelectorAll('.range-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === _curRange);
  });

  const s     = CATALOG.find(c => c.sym === sym);
  const p     = G.prices[sym];
  const price = p?.price ?? 0;
  const isUp  = (p?.chg ?? 0) >= 0;

  // Fill static header info
  document.getElementById('cm-em').textContent   = s?.em ?? '📊';
  document.getElementById('cm-sym').textContent  = sym;
  document.getElementById('cm-name').textContent = p?.name ?? s?.name ?? sym;

  // Show overlay
  const overlay = document.getElementById('chart-overlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Reset chart area
  destroyCharts();
  const loader = document.getElementById('cm-chart-loader');
  const canvas = document.getElementById('cm-canvas');
  const volWrap = document.getElementById('cm-vol-wrap');
  loader.textContent = '🌿 Fetching history…';
  loader.style.display = 'flex';
  canvas.style.display = 'none';
  volWrap.style.display = 'none';

  // Populate header + stats with what we have
  buildModalStats(sym, null, price);

  // Fetch history
  let hist = await fetchHistory(sym, _curRange);
  if (!hist) {
    hist = makeSyntheticHistory(sym, _curRange, price);
    if (hist.synthetic) {
      loader.textContent = '🟡 Simulated history';
      setTimeout(() => { if (loader) loader.style.display = 'none'; }, 1200);
    }
  }
  _lastHist = hist;
  buildModalStats(sym, hist, price);
  renderChart(hist, sym, isUp);
}

async function setRange(range, btn) {
  if (!_curSym) return;
  _curRange = range;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const p = G.prices[_curSym];
  const price = p?.price ?? 0;
  const isUp  = (p?.chg ?? 0) >= 0;

  destroyCharts();
  const loader  = document.getElementById('cm-chart-loader');
  const canvas  = document.getElementById('cm-canvas');
  const volWrap = document.getElementById('cm-vol-wrap');
  loader.textContent = '🌿 Fetching history…';
  loader.style.display = 'flex';
  canvas.style.display = 'none';
  volWrap.style.display = 'none';

  let hist = await fetchHistory(_curSym, range);
  if (!hist) hist = makeSyntheticHistory(_curSym, range, price);
  _lastHist = hist;
  buildModalStats(_curSym, hist, price);
  renderChart(hist, _curSym, isUp);
}

function closeChart(e) {
  // Allow: no event (programmatic), Escape key, clicking the backdrop, clicking ✕ button
  if (e && e.target && e.target.id !== 'chart-overlay' && e.target.id !== 'cm-close') return;
  destroyCharts();
  document.getElementById('chart-overlay').classList.remove('open');
  document.body.style.overflow = '';
  _curSym = null;
  _lastHist = null;
}
